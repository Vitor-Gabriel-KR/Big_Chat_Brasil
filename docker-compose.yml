services:
  postgres:
    image: postgres:16-alpine
    container_name: bcb-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: bcb
      POSTGRES_USER: bcb_user
      POSTGRES_PASSWORD: bcb_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bcb_user -d bcb"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bcb-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3333
      DATABASE_URL: postgresql://bcb_user:bcb_password@postgres:5432/bcb
    ports:
      - "3333:3333"
    volumes:
      - ./backend:/app
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    command: npm run dev

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bcb-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      BACKEND_URL: http://backend:3333
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - backend
    command: sh -c "npm install && npm run dev"

volumes:
  postgres_data:
  backend_node_modules:
  frontend_node_modules:
  frontend_next:
